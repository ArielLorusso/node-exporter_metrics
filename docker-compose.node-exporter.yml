# node-exporter para instalar en cualquier servidor Linux     ( MONITOR TARGET : ej AWS )
#  Uso:
#    ● copiar            docker-compose.node-exporter.yml
#    ● docker compose -f docker-compose.node-exporter.yml up -d
#
#  Requisitos:
#    ●  Docker y Docker Compose instalados
#    ●  Puerto 9100 abierto en el firewall/security group
#-------------------------------------------------------------------------------------------
#
# Una vez corriendo, Prometheus en el servidor central        ( MONITOR HOST  ej : Mi PC)
# solo necesita agregar en su    prometheus.yml:
#
#   - job_name: 'nombre-del-servidor'
#     static_configs:
#       - targets: ['IP-DE-ESTE-SERVIDOR:9100']
#         labels:
#           host: 'nombre-descriptivo'

services:
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped     # sobrevive reinicios, como systemd
    pid: host                   # acceso al árbol de procesos del host
    volumes:
      - /proc:/host/proc:ro     # métricas de procesos del host
      - /sys:/host/sys:ro       # métricas de hardware del host
      - /:/host/root:ro,rslave  # métricas de filesystem del host
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host/root'
      # Excluir filesystems virtuales para evitar ruido
      - '--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/docker/.+)($|/)'
      - '--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|cgroup|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$'
    ports:
      - "9100:9100"
    network_mode: host          # usa la red del host directamente
                                # más eficiente que bridge para monitoreo


# 1.A  Copiar el archivo desde Mi PC HOST  a la (EC2 TARGET)  con  scp  (OpenSSH secure copy )
scp docker-compose.node-exporter.yml  ec2-user@IP:/home/ec2-user/
# 1.B  Copiar el archivo desde (EC2 TARGET)                   con  curl   desde GitHub
curl -O https://raw.githubusercontent.com/tu-usuario/tu-repo/main/docker-compose.node-exporter.yml

# 2. Levantar
docker compose -f docker-compose.node-exporter.yml up -d

# 3. Verificar
curl http://localhost:9100/metrics | head -3
```
